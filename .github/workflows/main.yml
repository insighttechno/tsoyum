name: Deploy React App to S3 and CloudFront

on:
  push:
    branches:
      - main # or master, or whatever your main branch is called
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your specific Node.js version, e.g., 18, 20, 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps # or yarn install 

      - name: Build React app
        run: npm run build # or yarn build
        env:
          CI: false # This prevents create-react-app from treating warnings as errors during build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync ./dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
        # --delete ensures that files removed from your build are also removed from S3.
        # Make sure your S3 bucket is configured for static website hosting or
        # CloudFront has OAC/OAI setup correctly.

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
